remark: vless-reality
protocol: vless
listen: ""
port: 443
enable: true
settings:
  clients: []
  decryption: none
  fallbacks: []
streamSettings:
  network: tcp
  security: reality
  realitySettings:
    show: false
    dest: www.microsoft.com:443
    xver: 0
    serverNames:
      - www.microsoft.com
    privateKey: ""
    minClientVer: ""
    maxClientVer: ""
    maxTimediff: 0
    shortIds:
      - ""
    settings:
      publicKey: ""
      fingerprint: chrome
      serverName: ""
      spiderX: /
sniffing:
  enabled: true
  destOverride:
    - http
    - tls
    - quic
